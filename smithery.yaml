name: "@foundrynet/compliance-intel"
displayName: "Regulatory & Compliance Intelligence MCP"
description: >-
  Regulatory & compliance intelligence for AI agents — regulatory compliance
  monitoring, FDA recalls, federal register rules, product recalls, enforcement
  actions, and comment deadlines, classified by industry and severity. Tools:
  search_regulations, compliance_alerts, recall_check, enforcement_actions,
  comment_deadlines, daily_digest, mint_info. Part of the FoundryNet Data Network.
  Free tier then x402 (USDC on Solana).
startCommand:
  type: http
  url: "https://compliance-mcp-production.up.railway.app/mcp"
  transport: streamable-http
  configSchema:
    type: object
    properties:
      api_key:
        type: string
        title: "Forge billing key (optional)"
        description: "fnet_ key to bypass the per-query x402 paywall and bill to a Forge account."
