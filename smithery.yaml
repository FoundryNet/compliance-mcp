name: "@foundrynet/compliance-mcp"
displayName: "FoundryNet Compliance Intelligence"
description: >-
  Real-time regulatory monitoring — FDA recalls, federal register rules, OSHA citations, SEC enforcement actions, and compliance deadline tracking.
icon: "⚖️"
homepage: "https://foundrynet.io"
repository: "https://github.com/FoundryNet/compliance-mcp"
license: "MIT"
categories:
  - legal
  - data
  - compliance
tags:
  - regulatory-compliance
  - fda-recalls
  - federal-register
  - osha
  - sec-enforcement
  - compliance-monitoring
keywords:
  - regulatory-compliance
  - fda-recalls
  - federal-register
  - osha
  - sec-enforcement
  - compliance-monitoring
attestation:
  type: "cryptographic"
  verified_outputs: true
network:
  name: "FoundryNet Data Network"
  servers: 17
startCommand:
  type: http
  url: "https://compliance-mcp-production.up.railway.app/mcp"
  transport: streamable-http
  configSchema:
    type: object
    properties:
      api_key:
        type: string
        title: "Forge billing key (optional)"
        description: "fnet_ key to bypass the per-query paywall and bill to a Forge account."
